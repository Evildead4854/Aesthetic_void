<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend the $809 Billion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        #header {
            position: sticky; top: 0; background: #111; padding: 30px;
            text-align: center; border-bottom: 2px solid var(--accent); z-index: 100;
        }
        #money-display { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .item-card {
            background: #181818; padding: 25px; border-radius: 20px;
            border: 1px solid #333; text-align: center; transition: 0.3s;
        }
        .item-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .item-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .price { color: #aaa; margin-bottom: 20px; font-family: monospace; font-size: 1.1rem; }
        
        .controls { display: flex; justify-content: space-around; align-items: center; }
        button {
            padding: 12px 25px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s;
        }
        .buy { background: var(--accent); color: #000; }
        .sell { background: #333; color: #ff4d4d; }
        .count { font-size: 1.8rem; font-weight: 700; min-width: 50px; }

        #receipt {
            margin-top: 40px; background: #111; padding: 30px; border-radius: 20px;
            border: 1px dashed #444;
        }
        .receipt-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="header">
        <div id="money-display">$809,000,000,000</div>
        <p>You have the wealth of a modern emperor. Spend it wisely.</p>
    </div>

    <div class="container">
        <div class="grid" id="item-grid"></div>

        <div id="receipt">
            <h2 style="text-align: center;">The Receipt of Excess</h2>
            <div id="receipt-content"></div>
        </div>
    </div>

    <script>
        let bankBalance = 809000000000;
        const inventory = {};

        const storeItems = [
            { name: "Full McDonald's Meal", price: 15 },
            { name: "Gaming PC Setup", price: 5000 },
            { name: "In-Ground Pool", price: 50000 },
            { name: "Bugatti Mistral", price: 5000000 },
            { name: "NYC Penthouse", price: 150000000 },
            { name: "Boeing 747", price: 400000000 },
            { name: "F-35 Fighter Jet", price: 100000000 },
            { name: "Small Country (GDP)", price: 5000000000 },
            { name: "Professional NFL Team", price: 6000000000 },
            { name: "The Pyramids (Giza)", price: 50000000000 },
            { name: "The Moon (Exclusive Rights)", price: 150000000000 },
            { name: "Universal Healthcare (US/Year)", concealment: "True", price: 450000000000 }
        ];

        const grid = document.getElementById('item-grid');
        const moneyEl = document.getElementById('money-display');
        const receiptEl = document.getElementById('receipt-content');

        function updateUI() {
            moneyEl.innerText = "$" + bankBalance.toLocaleString();
            renderReceipt();
        }

        function renderReceipt() {
            receiptEl.innerHTML = "";
            let itemsFound = false;
            for (const [name, qty] of Object.entries(inventory)) {
                if (qty > 0) {
                    itemsFound = true;
                    const item = storeItems.find(i => i.name === name);
                    const div = document.createElement('div');
                    div.className = 'receipt-row';
                    div.innerHTML = `<span>${name} x${qty}</span> <span>$${(item.price * qty).toLocaleString()}</span>`;
                    receiptEl.appendChild(div);
                }
            }
            if (!itemsFound) receiptEl.innerHTML = "<p style='text-align:center; opacity:0.5;'>No purchases yet.</p>";
        }

        storeItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="price">$${item.price.toLocaleString()}</div>
                <div class="controls">
                    <button class="sell" onclick="handleTrade('${item.name}', -1)">Sell</button>
                    <span id="q-${index}" class="count">0</span>
                    <button class="buy" onclick="handleTrade('${item.name}', 1)">Buy</button>
                </div>
            `;
            grid.appendChild(card);
        });

        window.handleTrade = (name, direction) => {
            const item = storeItems.find(i => i.name === name);
            const index = storeItems.indexOf(item);
            
            if (direction === 1 && bankBalance >= item.price) {
                bankBalance -= item.price;
                inventory[name] = (inventory[name] || 0) + 1;
            } else if (direction === -1 && inventory[name] > 0) {
                bankBalance += item.price;
                inventory[name]--;
            }

            document.getElementById(`q-${index}`).innerText = inventory[name] || 0;
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
