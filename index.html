<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Aesthetic Void</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #050505; color: #eaeaea;
            font-family: 'Space Grotesk', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .void-container {
            display: flex; flex-direction: column; align-items: center;
            width: 80%; max-width: 600px; z-index: 10;
            text-align: center;
        }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; opacity: 0.7; }
        textarea {
            width: 100%; height: 150px; background: transparent;
            border: none; border-bottom: 1px solid #333; color: #fff;
            font-family: inherit; font-size: 1.2rem; resize: none; outline: none;
            padding: 10px; transition: border-color 0.3s ease;
        }
        button {
            margin-top: 40px; background: transparent; color: #fff;
            border: 1px solid #fff; padding: 12px 40px; font-size: 1rem;
            font-family: inherit; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: all 0.4s ease;
            margin-bottom: 30px;
        }
        button:hover { background: #fff; color: #050505; }

        /* RED COLOR TO TEST VISIBILITY */
        .counter-container {
            font-size: 1rem;
            color: #ff4d4d; 
            letter-spacing: 1px;
            margin-top: 20px;
            display: block !important;
            opacity: 1 !important;
        }
        #globalCount { font-weight: 600; color: #ff4d4d; }

        .shard { position: absolute; color: #fff; pointer-events: none; }
    </style>
</head>
<body>

    <div class="void-container" id="voidContainer">
        <h1>Scream into the void.</h1>
        <textarea id="userInput" placeholder="Type your secret..."></textarea>
        <button id="shatterBtn">Release</button>
        
        <div class="counter-container">
            <span id="globalCount">0</span> secrets swallowed
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlaahdKtqEfpRo4dH5mNS3EztQmPG4uEU",
            authDomain: "aesthetic-void.firebaseapp.com",
            databaseURL: "https://aesthetic-void-default-rtdb.firebaseio.com/",
            projectId: "aesthetic-void",
            storageBucket: "aesthetic-void.firebasestorage.app",
            messagingSenderId: "391354334307",
            appId: "1:391354334307:web:fdcd74425eb0e0ee954c56"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const counterRef = database.ref('voidCounter');

        counterRef.on('value', (snapshot) => {
            const count = snapshot.val() || 0;
            document.getElementById('globalCount').innerText = count.toLocaleString();
        });

        document.getElementById('shatterBtn').addEventListener('click', function() {
            const textValue = document.getElementById('userInput').value;
            if(textValue.trim() === "") return; 
            counterRef.transaction((current) => (current || 0) + 1);
            createShards(textValue);
            document.getElementById('voidContainer').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('userInput').value = "";
                document.getElementById('voidContainer').style.opacity = 1;
            }, 3000);
        });

        function createShards(text) {
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;
            text.split("").forEach((char) => {
                 const span = document.createElement('span');
                 span.innerText = char;
                 span.style.position = "absolute";
                 span.style.left = startX + "px";
                 span.style.top = startY + "px";
                 span.style.color = "#fff";
                 document.body.appendChild(span);
                 anime({
                     targets: span,
                     translateX: () => anime.random(-600, 600),
                     translateY: () => anime.random(-600, 600),
                     opacity: 0,
                     duration: 2000,
                     complete: () => span.remove()
                 });
            });
        }
    </script>
</body>
</html>
